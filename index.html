    font-size: 0.75rem;
    letter-spacing: 0.08em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .q-text { font-size: 1.05rem; margin-bottom: 12px; }
  .option {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 7px 10px;
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid transparent;
  }
  .option:hover { background: rgba(255,255,255,0.03); }
  .option input { margin-top: 4px; }
  .option.correct { border-color: var(--good); background: rgba(111,174,124,0.12); }
  .option.incorrect { border-color: var(--bad); background: rgba(201,107,75,0.14); }

  .toolbar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--panel);
    border-top: 1px solid var(--line);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  button {
    font-family: 'Trebuchet MS', Tahoma, sans-serif;
    background: var(--accent);
    color: #1b1f1a;
    border: none;
    padding: 11px 26px;
    border-radius: 4px;
    font-size: 0.95rem;
    font-weight: bold;
    cursor: pointer;
    letter-spacing: 0.03em;
  }
  button:hover { filter: brightness(1.08); }
  button.secondary {
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--line);
  }
  #progress { color: var(--muted); font-size: 0.9rem; }

  #result-banner {
    display: none;
    max-width: 760px;
    margin: 20px auto 0;
    padding: 18px 22px;
    border-radius: 6px;
    border: 1px solid var(--accent);
    background: rgba(201,162,75,0.1);

  }
  #result-banner h2 {
    margin: 0 0 4px;
    font-family: 'Trebuchet MS', Tahoma, sans-serif;
    color: var(--accent);
  }
  #result-banner p { margin: 0; color: var(--muted); }

  .unanswered-flag {
    color: var(--bad);
    font-size: 0.8rem;
    margin-left: 6px;

</head>

{q:"Which of the following is not an objective condition for the existence of society?",options:["Sharing a common culture","None of the above","Occupying a common territorial space","Sharing common military defence","Group of people"],answer:3},
];

const form = document.getElementById('quiz-form');
const progressEl = document.getElementById('progress');

function letter(i){ return String.fromCharCode(97+i); }

QUESTIONS.forEach((item, qi) => {
  const card = document.createElement('div');
  card.className = 'question-card';
  card.dataset.qi = qi;

  const idxDiv = document.createElement('div');
  idxDiv.className = 'q-index';
  idxDiv.textContent = 'Question ' + (qi+1) + ' of ' + QUESTIONS.length;
  card.appendChild(idxDiv);

  const qText = document.createElement('div');
  qText.className = 'q-text';
  qText.textContent = item.q;
  card.appendChild(qText);

  item.options.forEach((opt, oi) => {
    const label = document.createElement('label');
    label.className = 'option';
    label.dataset.oi = oi;
    const input = document.createElement('input');
    input.type = 'radio';
    input.name = 'q' + qi;
    input.value = oi;
    input.addEventListener('change', updateProgress);
    const span = document.createElement('span');
    span.textContent = letter(oi) + '. ' + opt;
    label.appendChild(input);
    label.appendChild(span);
    card.appendChild(label);
  });

  form.appendChild(card);
});

function updateProgress(){
  const answered = QUESTIONS.filter((_, qi) => form.querySelector(`input[name="q${qi}"]:checked`)).length;
  progressEl.textContent = answered + ' of ' + QUESTIONS.length + ' answered';
}

document.getElementById('reset-btn').addEventListener('click', () => {
  form.reset();
  document.querySelectorAll('.option').forEach(o => o.classList.remove('correct','incorrect'));
  document.querySelectorAll('.unanswered-flag').forEach(e => e.remove());
  document.getElementById('result-banner').style.display = 'none';
  updateProgress();
  window.scrollTo({top:0, behavior:'smooth'});
});

document.getElementById('submit-btn').addEventListener('click', () => {
  let score = 0;
  let unanswered = 0;

  QUESTIONS.forEach((item, qi) => {
    const card = form.querySelector(`.question-card[data-qi="${qi}"]`);
    const selected = form.querySelector(`input[name="q${qi}"]:checked`);
    const options = card.querySelectorAll('.option');

    options.forEach(o => o.classList.remove('correct','incorrect'));
    const existingFlag = card.querySelector('.unanswered-flag');
    if (existingFlag) existingFlag.remove();

    // mark correct answer
    options[item.answer].classList.add('correct');

    if (selected) {
      const chosenIdx = parseInt(selected.value, 10);
      if (chosenIdx === item.answer) {
        score++;
      } else {
        options[chosenIdx].classList.add('incorrect');
      }
    } else {
      unanswered++;
      const idxDiv = card.querySelector('.q-index');
      const flag = document.createElement('span');
      flag.className = 'unanswered-flag';
      flag.textContent = '— not answered';
      idxDiv.appendChild(flag);
    }
  });

  const total = QUESTIONS.length;
  const pct = ((score/total)*100).toFixed(1);
  const banner = document.getElementById('result-banner');
  document.getElementById('score-line').textContent = `Score: ${score} / ${total} (${pct}%)`;
  document.getElementById('score-sub').textContent = unanswered > 0
    ? `${unanswered} question(s) left unanswered — marked wrong. Scroll down to review each answer (green = correct, red = your incorrect pick).`
    : `Scroll down to review each answer (green = correct, red = your incorrect pick).`;
  banner.style.display = 'block';
  window.scrollTo({top:0, behavior:'smooth'});
});

updateProgress();
</script>
